<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東江ガス タスク発注管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#002a78;--navy-light:#003a9e;--navy-dark:#001a52;--gold:#ffd740;--gold-light:#ffe680;--gold-dark:#c8a600;--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text-sub:#5a6070;--green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--orange:#ea580c;--orange-bg:#fff7ed;--blue:#2563eb;--blue-bg:#dbeafe;--radius:12px;--shadow:0 2px 12px rgba(0,42,120,.08)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);color:#fff;padding:20px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,42,120,.3)}
header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
header h1 span.gold{color:var(--gold);font-weight:900}
header .subtitle{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px}
header .user-badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px}
.billing-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px}
.billing-bar .billing-updated{font-size:10px;color:#999;text-align:center;margin-bottom:10px}
.billing-months{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.billing-month{text-align:center;padding:10px;border-radius:10px}
.billing-month.apr{background:linear-gradient(135deg,#eef2ff,#dbeafe)}
.billing-month.may{background:linear-gradient(135deg,#fef9e7,#fff7e0)}
.billing-month .billing-label{font-size:11px;color:var(--text-sub);font-weight:700}
.billing-month .billing-total{font-size:22px;font-weight:900;color:var(--navy);margin:4px 0}
.billing-month .billing-breakdown{font-size:10px;color:var(--text-sub)}
.month-subtotal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;border:2px dashed #d0d0d0}
.month-subtotal .subtotal-label{font-size:13px;font-weight:700;color:var(--text-sub)}
.month-subtotal .subtotal-value{font-size:18px;font-weight:900;color:var(--navy)}
.container{max-width:640px;margin:0 auto;padding:12px}
.section-header{font-size:14px;font-weight:900;color:var(--navy);padding:16px 0 8px;border-bottom:2px solid var(--navy);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.section-header .section-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.section-tag-blue{background:var(--blue-bg);color:var(--blue)}
.section-tag-gold{background:#fff7e0;color:var(--gold-dark)}
.task-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border-left:4px solid var(--navy)}
.task-card.approved{border-left-color:var(--green)}
.task-card.rejected{border-left-color:var(--red);opacity:.7}
.task-card.pending{border-left-color:var(--orange)}
.task-card.included{border-left-color:var(--blue)}
.task-card.closed{border-left-color:#9ca3af;opacity:.8}
.task-header{padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-num{font-size:11px;font-weight:700;color:#fff;background:var(--navy);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-card.approved .task-num{background:var(--green)}
.task-card.rejected .task-num{background:var(--red)}
.task-card.pending .task-num{background:var(--orange)}
.task-card.included .task-num{background:var(--blue)}
.task-card.closed .task-num{background:#9ca3af}
.task-title{font-size:14px;font-weight:700;flex:1;line-height:1.5}
.task-price{font-size:16px;font-weight:900;color:var(--navy);white-space:nowrap}
.task-price-included{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap}
.task-meta{padding:0 16px 10px;display:flex;gap:12px;font-size:12px;color:var(--text-sub)}
.task-meta .deadline{display:flex;align-items:center;gap:4px}
.task-meta .deadline.overdue{color:var(--red);font-weight:700}
.task-actions{padding:8px 16px 14px;display:flex;gap:6px;flex-wrap:wrap}
.radio-group{display:flex;gap:6px;width:100%}
.radio-btn{flex:1;position:relative}
.radio-btn input{position:absolute;opacity:0;width:0;height:0}
.radio-btn label{display:block;text-align:center;padding:10px 8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #e5e7eb;transition:all .2s;user-select:none}
.radio-btn input:checked+label.approve-label{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.radio-btn input:checked+label.pending-label{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.radio-btn input:checked+label.reject-label{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.radio-btn label:active{transform:scale(.96)}
.admin-controls{padding:8px 16px 14px;display:flex;gap:8px;border-top:1px solid #f0f0f0}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:active{transform:scale(.96)}
.btn-edit{background:#e0e7ff;color:var(--navy)}
.btn-delete{background:var(--red-bg);color:var(--red)}
.btn-primary{background:var(--navy);color:#fff;width:100%}
.btn-primary:hover{background:var(--navy-light)}
.status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block}
.status-badge.approved{background:var(--green-bg);color:var(--green)}
.status-badge.pending{background:var(--orange-bg);color:var(--orange)}
.status-badge.rejected{background:var(--red-bg);color:var(--red)}
.status-badge.none{background:#f0f0f0;color:#999}
.status-badge.included{background:var(--blue-bg);color:var(--blue)}
.status-badge.closed{background:#e5e7eb;color:#6b7280}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--navy);border:none;font-size:28px;font-weight:900;box-shadow:0 4px 20px rgba(0,0,0,.25);cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:active{transform:scale(.9)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px 20px 40px;transform:translateY(100%);transition:transform .3s}
.modal-overlay.active .modal{transform:translateY(0)}
.modal h2{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--navy)}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions .btn{flex:1;padding:14px}
.btn-cancel{background:#f0f0f0;color:var(--text-sub)}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 50%,var(--navy-light) 100%);padding:24px}
.login-box{background:#fff;border-radius:var(--radius);padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.login-box h2{text-align:center;color:var(--navy);font-size:20px;margin-bottom:4px}
.login-box .login-sub{text-align:center;color:var(--text-sub);font-size:12px;margin-bottom:24px}
.login-box .form-group{margin-bottom:16px}
.login-box .btn-primary{margin-top:8px}
.login-logo{color:var(--gold);font-size:32px;font-weight:900;text-align:center;margin-bottom:24px;letter-spacing:2px}
.login-logo span{color:#fff;font-weight:400;font-size:14px;display:block;letter-spacing:0;margin-top:4px}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.logout-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
header{position:sticky;top:0}
header .header-inner{position:relative}
.note-text{font-size:11px;color:var(--text-sub);text-align:center;padding:8px 16px;background:#fff9e6;border-bottom:1px solid #f0e6c0}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-sub)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.base-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:2px solid var(--blue)}
.base-section-header{background:linear-gradient(135deg,var(--blue) 0%,#3b82f6 100%);color:#fff;padding:14px 16px}
.base-section-header h3{font-size:15px;font-weight:900}
.base-section-header .base-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:12px;opacity:.9}
.base-section-body{padding:12px 16px}
.base-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;gap:6px}
.base-item:last-child{border-bottom:none}
.base-item .item-title{flex:1;line-height:1.4}
.base-item .item-date{color:var(--text-sub);font-size:11px;white-space:nowrap}
.base-item .item-hours{font-weight:700;color:var(--blue);white-space:nowrap;min-width:30px;text-align:right}
.base-item .item-price{font-weight:700;color:var(--navy);white-space:nowrap;min-width:60px;text-align:right;font-size:12px}
.base-item .item-del{color:var(--red);background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px;font-family:inherit}
.btn-add-work{width:100%;padding:10px;border:2px dashed var(--blue);border-radius:8px;background:transparent;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s}
.btn-add-work:active{background:var(--blue-bg)}
.base-tpl{font-size:11px;color:#9ca3af;font-style:italic;padding:2px 0}
.base-collapse-toggle{cursor:pointer;user-select:none}
.base-collapse-toggle .toggle-row{display:flex;justify-content:space-between;align-items:center}
.base-collapse-toggle .toggle-arrow-bw{font-size:11px;color:rgba(255,255,255,.7);margin-left:8px;transition:transform .3s;display:inline-block}
.base-collapse-toggle .toggle-arrow-bw.open{transform:rotate(90deg)}
.base-collapse-body{overflow:hidden;transition:max-height .4s ease;max-height:0}
.base-collapse-body.open{max-height:3000px}
.base-progress{padding:12px 16px;border-top:2px solid #f0f0f0}
.progress-bar-bg{background:#e5e7eb;border-radius:10px;height:12px;overflow:hidden;margin:8px 0}
.progress-bar-fill{background:linear-gradient(90deg,var(--blue),#3b82f6);height:100%;border-radius:10px;transition:width .5s}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sub)}
.progress-info .remaining{color:var(--blue);font-weight:700}
.progress-summary{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;padding-top:6px;border-top:1px dashed #e0e0e0}
.progress-summary .used{color:var(--text-sub)}
.progress-summary .remain{color:var(--blue);font-weight:700}
.task-desc{padding:0 16px 8px;font-size:12px;color:var(--red);font-weight:700;line-height:1.4}
.task-desc.normal{color:var(--text-sub);font-weight:400}
.carryover-card{background:#f8f8f8;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:2px solid #d0d0d0}
.carryover-header{background:linear-gradient(135deg,#6b7280 0%,#9ca3af 100%);color:#fff;padding:14px 16px}
.carryover-header h3{font-size:14px;font-weight:900}
.carryover-header .carryover-price{font-size:18px;font-weight:900;margin-top:4px}
.carryover-body{padding:14px 16px;font-size:13px;color:var(--text-sub);line-height:1.6}
.carryover-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#e5e7eb;color:#6b7280;margin-top:8px}
/* 月末締めボタン */
.close-month-bar{background:var(--navy-dark);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.close-month-bar .close-info{color:rgba(255,255,255,.7);font-size:11px;flex:1}
.btn-close-month{background:var(--gold);color:var(--navy);border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.btn-close-month:active{transform:scale(.96)}
/* 完了済みセクション */
.closed-section{margin-bottom:16px}
.closed-toggle{background:#e5e7eb;border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .2s}
.closed-toggle:active{background:#d1d5db}
.closed-toggle .toggle-title{font-size:14px;font-weight:900;color:#6b7280}
.closed-toggle .toggle-amount{font-size:16px;font-weight:900;color:#374151}
.closed-toggle .toggle-arrow{font-size:12px;color:#9ca3af;transition:transform .3s}
.closed-toggle .toggle-arrow.open{transform:rotate(180deg)}
.closed-body{overflow:hidden;transition:max-height .4s ease;max-height:0}
.closed-body.open{max-height:2000px}
.closed-body-inner{padding:12px 0}
.dl-buttons{display:flex;gap:8px;padding:8px 0}
.btn-dl{flex:1;padding:10px;border:2px solid #d0d0d0;border-radius:8px;background:#f8f8f8;color:#374151;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.btn-dl:active{transform:scale(.96);background:#e5e7eb}
.btn-dl-csv{border-color:var(--green);color:var(--green)}
.btn-dl-json{border-color:var(--blue);color:var(--blue)}
.history-section{margin-top:16px}
.history-header{font-size:14px;font-weight:900;color:#6b7280;padding:12px 0 8px;border-bottom:2px solid #d0d0d0;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.history-card{background:#f8f8f8;border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:1px solid #e5e7eb;cursor:pointer;transition:background .2s}
.history-card:active{background:#e5e7eb}
.history-card .h-top{display:flex;justify-content:space-between;align-items:center}
.history-card .h-label{font-size:14px;font-weight:900;color:#374151}
.history-card .h-amount{font-size:16px;font-weight:900;color:var(--navy)}
.history-card .h-meta{font-size:11px;color:#9ca3af;margin-top:4px}
</style>
</head>
<body>

<div id="app"></div>

<script>
const STORAGE_KEY = 'agariegas_tasks_v11';
const SESSION_KEY = 'agariegas_session';
const CLOSED_KEY = 'agariegas_closed_v1';
const BASE_WORK_KEY = 'agariegas_basework_v1';
const ADMIN_PASS = 'makoto2026';
const VIEWER_PASS = 'agarie2026';

const BASE_CONF = {price:100000,totalHours:20,hourlyRate:5000};
const CARRYOVER = {price:100000,hours:20,hourlyRate:5000,applyMonth:'apr'};
const ACTIVE_MONTHS = ['apr','may','jun'];
const MONTH_LABELS = {apr:'2026年4月',may:'2026年5月',jun:'2026年6月'};

const MONTHLY_TEMPLATE = [
  {title:'ミーティング（月2回）',date:'',hours:0,price:0},
  {title:'LINE対応・調整',date:'',hours:0,price:0},
  {title:'企画立案・レポート',date:'',hours:0,price:0},
  {title:'SNS投稿文・概要欄作成',date:'',hours:0,price:0}
];

const APR_INITIAL_ITEMS = [
  {title:'ネーミング確定調整（アンケート集計・役員会向け分析レポート）',date:'2026-04-01',hours:4,price:20000},
  {title:'「決定しました」バナー・HPお知らせページ・作業指示書',date:'2026-04-01',hours:5,price:25000},
  {title:'キャラクター決定バナー（仮）制作',date:'2026-04-02',hours:2,price:10000},
  {title:'キャラクター紹介ページ（仮）制作',date:'2026-04-02',hours:2,price:10000},
  {title:'打ち合わせ（タスクリスト・スケジュール確認）',date:'2026-04-07',hours:1,price:5000}
];

function loadBaseWork(){
  const d=localStorage.getItem(BASE_WORK_KEY);
  if(d) return JSON.parse(d);
  const init={};
  ACTIVE_MONTHS.forEach(m=>{
    if(m==='apr') init[m]=[...APR_INITIAL_ITEMS,...MONTHLY_TEMPLATE.map(t=>({...t}))];
    else init[m]=MONTHLY_TEMPLATE.map(t=>({...t}));
  });
  saveBaseWork(init);
  return init;
}
function saveBaseWork(data){localStorage.setItem(BASE_WORK_KEY,JSON.stringify(data));}
function getBaseStats(items){
  const usedH=items.reduce((s,i)=>s+i.hours,0);
  const usedP=items.reduce((s,i)=>s+i.price,0);
  return {usedHours:usedH,usedPrice:usedP,remainHours:BASE_CONF.totalHours-usedH,remainPrice:BASE_CONF.price-usedP};
}

const INCL_KEY = 'agariegas_included_v1';
const DEFAULT_INCLUDED = [
  {id:101,title:'キャラクター決定バナー 正式版制作',deadline:'2026-04-14',status:'none',hours:2},
  {id:102,title:'キャラクター紹介ページ 制作・Web公開',deadline:'2026-04-14',status:'none',hours:2},
  {id:103,title:'当選者登録Googleフォーム 制作・運用',deadline:'2026-04-14',status:'none',hours:1},
  {id:104,title:'PRプレスリリース 原稿作成',deadline:'2026-04-15',status:'none',hours:1}
];
function loadIncluded(){
  const d=localStorage.getItem(INCL_KEY);
  if(!d){saveIncluded(DEFAULT_INCLUDED);return DEFAULT_INCLUDED;}
  return JSON.parse(d);
}
function saveIncluded(data){localStorage.setItem(INCL_KEY,JSON.stringify(data));}

function approveIncluded(id){
  const items=loadIncluded();
  const item=items.find(x=>x.id===id);
  if(!item)return;
  item.status='approved';
  saveIncluded(items);
  // Add to base work April items
  const bw=loadBaseWork();
  if(!bw['apr'])bw['apr']=[];
  bw['apr'].push({title:item.title,date:item.deadline,hours:item.hours,price:item.hours*BASE_CONF.hourlyRate});
  saveBaseWork(bw);
  render();
}
function updateIncludedStatus(id,status){
  const items=loadIncluded();
  const item=items.find(x=>x.id===id);
  if(!item)return;
  if(status==='approved'){approveIncluded(id);return;}
  item.status=status;
  saveIncluded(items);
  render();
}

const DEFAULT_TASKS = [
  {id:1,title:'ショート動画A 制作・配信（実施済み）',price:80000,deadline:'2026-04-01',status:'none',note:'',desc:'4/1制作、YouTube、Instagram、TikTok、Xに配信済み',approveOnly:true,month:'apr'},
  {id:2,title:'ショート動画B（キャラクターネーミング表記＆PRお披露目動画）',price:80000,deadline:'2026-04-15',status:'none',note:'',month:'apr'},
  {id:7,title:'Instagram公式アカウント 立ち上げ・初回投稿（ショート動画Bを投稿予定）',price:30000,deadline:'2026-04-15',status:'none',note:'',desc:'初回投稿はショート動画Bを使用',month:'apr'},
  {id:8,title:'YouTube公式チャンネル 立ち上げ・初回動画（ショート動画Bを投稿予定）',price:50000,deadline:'2026-04-15',status:'none',note:'',desc:'初回動画はショート動画Bを使用',month:'apr'},
  {id:10,title:'キャラクター活用マニュアル制作',price:80000,deadline:'2026-04-30',status:'none',note:'',desc:'ロゴ・表記ルール\nカラー・ボイス規定\nSNS運用ルール・使用禁止事項\nポージング・グッズ展開ルール\n市場相場：¥150,000〜¥300,000',month:'may'},

function loadTasks(){
  const d=localStorage.getItem(STORAGE_KEY);
  if(!d){saveTasks(DEFAULT_TASKS);return DEFAULT_TASKS;}
  return JSON.parse(d);
}
function saveTasks(tasks){localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));}
function loadClosed(){
  const d=localStorage.getItem(CLOSED_KEY);
  return d?JSON.parse(d):[];
}
function saveClosed(data){localStorage.setItem(CLOSED_KEY,JSON.stringify(data));}
function getSession(){return sessionStorage.getItem(SESSION_KEY);}
function setSession(role){sessionStorage.setItem(SESSION_KEY,role);}
function clearSession(){sessionStorage.removeItem(SESSION_KEY);}

function formatPrice(n){return '\u00a5'+n.toLocaleString();}
function formatDate(d){
  if(!d)return '';
  const parts=d.split('-');
  return parseInt(parts[1])+'/'+parseInt(parts[2]);
}
function isOverdue(d){
  if(!d)return false;
  const today=new Date();today.setHours(0,0,0,0);
  return new Date(d)<today;
}
function getNowString(){
  const now=new Date();
  return now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+'現在';
}

function render(){
  const role=getSession();
  if(!role){renderLogin();return;}
  renderApp(role);
}

function renderLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-screen">
      <div class="login-logo">AGARIEGAS<span>タスク発注管理システム</span></div>
      <div class="login-box">
        <h2>ログイン</h2>
        <p class="login-sub">パスワードを入力してください</p>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="loginPass" placeholder="パスワード" autocomplete="off">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
        <div class="error-msg" id="loginError"></div>
      </div>
    </div>`;
  document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('loginPass').focus();
}

function doLogin(){
  const pass=document.getElementById('loginPass').value;
  if(pass===ADMIN_PASS){setSession('admin');render();}
  else if(pass===VIEWER_PASS){setSession('viewer');render();}
  else{document.getElementById('loginError').textContent='パスワードが正しくありません';}
}

        <div>
          <span style="font-size:10px;opacity:.7">5月〜請求</span><br>
          <span style="font-size:15px;font-weight:900;color:var(--gold)">${formatPrice(mayBilling)}</span>
        </div>
        <div style="width:1px;height:28px;background:rgba(255,255,255,.15)"></div>
        <div style="text-align:right">
          <span style="font-size:10px;opacity:.5">今月請求予定合計</span><br>
          <span style="font-size:18px;font-weight:900;color:var(--gold)">${formatPrice(aprBilling)}</span>
        </div>
      </div>
      ${totalPending>0?`<div style="text-align:center;font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">確認待ち合計：${formatPrice(totalPending)}</div>`:''}
    </div>`;

  if(isAdmin){
    html+=`<button class="fab" onclick="openAddModal()" title="タスク追加">+</button>`;
  }

  // モーダル
  html+=`
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
      <div class="modal" id="modalContent">
        <h2 id="modalTitle">タスク追加</h2>
        <div class="form-group">
          <label>タスク名</label>
          <input type="text" id="mTitle" placeholder="例：ショート動画 制作・配信">
        </div>
        <div class="form-group">
          <label>金額（円）</label>
          <input type="number" id="mPrice" placeholder="例：80000" min="0" step="1000">
        </div>
        <div class="form-group">
          <label>締切日</label>
          <input type="date" id="mDeadline">
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
          <button class="btn btn-primary" id="mSubmit" onclick="submitTask()">追加</button>
        </div>
      </div>
    </div>`;

  document.getElementById('app').innerHTML=html;
}

function escHtml(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

let editingId=null;

function openAddModal(){
  editingId=null;
  setTimeout(()=>{
    document.getElementById('modalTitle').textContent='タスク追加';
    document.getElementById('mTitle').value='';
    document.getElementById('mPrice').value='';
    document.getElementById('mDeadline').value='';
    document.getElementById('mSubmit').textContent='追加';
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('mTitle').focus();
  },10);
}

function openEditModal(id){
  const tasks=loadTasks();
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  editingId=id;
  setTimeout(()=>{
    document.getElementById('modalTitle').textContent='タスク編集';
    document.getElementById('mTitle').value=t.title;
    document.getElementById('mPrice').value=t.price;
    document.getElementById('mDeadline').value=t.deadline||'';
    document.getElementById('mSubmit').textContent='保存';
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('mTitle').focus();
  },10);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
  editingId=null;
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modalOverlay'))closeModal();
}

function submitTask(){
  const title=document.getElementById('mTitle').value.trim();
  const price=parseInt(document.getElementById('mPrice').value)||0;
  const deadline=document.getElementById('mDeadline').value;
  if(!title){alert('タスク名を入力してください');return;}
  if(price<=0){alert('金額を入力してください');return;}

  const tasks=loadTasks();
  if(editingId!==null){
    const t=tasks.find(x=>x.id===editingId);
    if(t){t.title=title;t.price=price;t.deadline=deadline;}
  }else{
    const maxId=tasks.reduce((m,t)=>Math.max(m,t.id),0);
    tasks.push({id:maxId+1,title,price,deadline,status:'none',note:''});
  }
  saveTasks(tasks);
  closeModal();
  render();
}

function deleteTask(id){
  if(!confirm('このタスクを削除しますか？'))return;
  const tasks=loadTasks().filter(t=>t.id!==id);
  saveTasks(tasks);
  render();
}

function updateStatus(id,status){
  const tasks=loadTasks();
  const t=tasks.find(x=>x.id===id);
  if(t){t.status=status;saveTasks(tasks);render();}
}

function toggleBaseMonth(mk){
  const el=document.getElementById('bw_body_'+mk);
  const arrow=document.getElementById('bw_arrow_'+mk);
  if(el.classList.contains('open')){
    el.classList.remove('open');
    arrow.classList.remove('open');
  }else{
    el.classList.add('open');
    arrow.classList.add('open');
  }
}

function toggleClosed(idx){
  const el=document.getElementById('closed_'+idx);
  const arrow=document.getElementById('arrow_'+idx);
  if(el.classList.contains('open')){
    el.classList.remove('open');
    arrow.classList.remove('open');
  }else{
    el.classList.add('open');
    arrow.classList.add('open');
  }
}

function closeMonth(monthKey,label){
  const tasks=loadTasks();
  const monthTasks=tasks.filter(t=>(t.month||'apr')===monthKey && t.status!=='closed');
  const approvedTasks=monthTasks.filter(t=>t.status==='approved');
  const approvedTotal=approvedTasks.reduce((s,t)=>s+t.price,0);

  if(approvedTasks.length===0){
    alert('承認済みのタスクがありません。\n先にタスクを承認してください。');
    return;
  }

  const msg=label+'分を締めますか？\n\n承認済みタスク '+approvedTasks.length+'件・'+formatPrice(approvedTotal)+' を確定します。\n\n未承認のタスクはそのまま残ります。';
  if(!confirm(msg))return;

  // Save to closed archive
  const closed=loadClosed();
  closed.push({
    label: label,
    monthKey: monthKey,
    closedAt: new Date().toISOString(),
    basePrice: BASE_CONF.price,
    carryoverPrice: monthKey===CARRYOVER.applyMonth?CARRYOVER.price:0,
    approvedTotal: approvedTotal,
    tasks: approvedTasks.map(t=>({title:t.title,price:t.price,deadline:t.deadline}))
  });
  saveClosed(closed);

  // Mark approved tasks as closed, keep others active
  tasks.forEach(t=>{
    if((t.month||'apr')===monthKey && t.status==='approved'){
      t.status='closed';
    }
  });
  saveTasks(tasks);

  // Auto-download CSV
  downloadCSV(closed.length-1);

  render();
}

function generateCSV(cm){
  const total=cm.basePrice+cm.carryoverPrice+cm.approvedTotal;
  const closedDate=cm.closedAt?new Date(cm.closedAt).toLocaleString('ja-JP'):'';
  let csv='\ufeff';// BOM for Excel
  csv+='東江ガス 確定請求書,'+cm.label+'分\r\n';
  csv+='締め日時,'+closedDate+'\r\n';
  csv+='\r\n';
  csv+='項目,金額,ステータス\r\n';
  csv+='基本業務（20h×¥5,000/h）,'+cm.basePrice+',確定\r\n';
  csv+='繰越（3月分超過業務）,'+cm.carryoverPrice+',確定\r\n';
  cm.tasks.forEach(t=>{
    csv+='"'+t.title.replace(/"/g,'""')+'",'+t.price+',承認済・確定\r\n';
  });
  csv+='\r\n';
  csv+='承認済みスポット合計,'+cm.approvedTotal+'\r\n';
  csv+=cm.label+'分 確定請求額合計,'+total+'\r\n';
  return csv;
}

function downloadCSV(idx){
  const closed=loadClosed();
  if(idx<0||idx>=closed.length)return;
  const cm=closed[idx];
  const csv=generateCSV(cm);
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='agariegas_'+cm.label+'_確定請求.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadJSON(idx){
  const closed=loadClosed();
  if(idx<0||idx>=closed.length)return;
  const cm=closed[idx];
  const json=JSON.stringify(cm,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='agariegas_'+cm.label+'_請求データ.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function addBaseItem(monthKey){
  const title=prompt('作業名を入力してください：');
  if(!title)return;
  const dateStr=prompt('日付（例：2026-04-10）：','')||'';
  const hours=parseFloat(prompt('作業時間（h）：','0'))||0;
  const price=hours*BASE_CONF.hourlyRate;
  const bw=loadBaseWork();
  if(!bw[monthKey])bw[monthKey]=[];
  bw[monthKey].push({title,date:dateStr,hours,price});
  saveBaseWork(bw);
  render();
}

function deleteBaseItem(monthKey,idx){
  if(!confirm('この作業を削除しますか？'))return;
  const bw=loadBaseWork();
  if(bw[monthKey])bw[monthKey].splice(idx,1);
  saveBaseWork(bw);
  render();
}

function downloadAllHistory(){
  const closed=loadClosed();
  const history={
    company:'東江ガス',
    contractor:'楽しくなる合同会社',
    exportedAt:new Date().toISOString(),
    months:closed
  };
  const json=JSON.stringify(history,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='agariegas_history.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();
</script>
